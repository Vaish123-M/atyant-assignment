# NGINX config to serve /launchpad from an upstream app
# Place this file in your server's NGINX sites-available and symlink to sites-enabled

upstream launchpad_upstream {
  # Replace with your app backend (local preview or container)
  # Example: if you run a static build served by a simple HTTP server on port 5174
  server 127.0.0.1:5174;
}

server {
  listen 80;
  server_name www.atyant.in atyant.in;

  # Redirect HTTP to HTTPS (if you enable SSL later)
  # return 301 https://$host$request_uri;

  # ACME challenge path (letsencrypt)
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
  }

  # Serve the launchpad vertical under /launchpad/
  location ^~ /launchpad/ {
    proxy_pass http://launchpad_upstream/; # preserve path after upstream slash
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Caching for static assets
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Serve static assets for launchpad more efficiently (optional — adjust path to your build output)
  location ~ ^/launchpad/assets/ {
    alias /var/www/launchpad/dist/assets/;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback: if upstream returns 404, serve the app's index.html
  location /launchpad/ {
    try_files $uri $uri/ @launchpad_fallback;
  }

  location @launchpad_fallback {
    proxy_pass http://launchpad_upstream/;
  }

  # Other main-site locations continue to be served by existing config
}
